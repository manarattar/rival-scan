name: Scheduled competitor refresh

on:
  schedule:
    - cron: "0 8 * * *"     # every day at 08:00 UTC
  workflow_dispatch:          # allow manual trigger from GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Wake backend and refresh all competitors
        run: |
          echo "Triggering refresh at $(date -u)"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://rival-scan-backend.onrender.com/api/competitors/refresh-all \
            -H "Content-Type: application/json" \
            --max-time 30)
          echo "Response: $RESPONSE"
          if [ "$RESPONSE" != "200" ]; then
            echo "Unexpected status $RESPONSE"
            exit 1
          fi
